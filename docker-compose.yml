services:
  backend:
    build:
      context: ./backend

    container_name: farmsmart-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000

    container_name: farmsmart-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped